name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  python:
    name: Python
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: helloworld

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: helloworld/.python-version

      - name: Install uv
        run: python -m pip install uv

      - name: Install dependencies
        run: uv sync --frozen

      - name: Compile Python sources
        run: uv run --frozen python -m compileall src
